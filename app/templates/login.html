{% extends "base.html" %} {% block title %}Login{% endblock %} {% block body %}
<main class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">
      <div class="card shadow-sm border-0">
        <!-- header color aluminium -->
        <div
          class="card-header text-center text-white"
          style="background-color: #848789"
        >
          <h1 class="h5 mb-0">FastAPI Research Project</h1>
        </div>

        <div class="card-body">
          <h2 class="h6 mb-4 text-center text-muted">Accedi al sistema</h2>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <label class="form-label text-secondary">Email</label>
              <input
                type="email"
                class="form-control"
                id="email"
                required
                autofocus
                autocomplete="username"
              />
            </div>

            <div class="mb-4">
              <label class="form-label text-secondary">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                required
                autocomplete="current-password"
              />
            </div>

            <div class="d-grid">
              <button
                class="btn text-white"
                style="background-color: #619ad6"
                type="submit"
                id="loginBtn"
              >
                Accedi
              </button>
            </div>
          </form>

          <div id="errorBox" class="alert alert-danger mt-3 d-none"></div>
        </div>
      </div>
    </div>
  </div>
</main>
{% endblock %} {% block scripts %}
<script>
  // redirect automatico se già autenticato
  if (localStorage.getItem("access_token")) {
    window.location.href = "/";
  }

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("errorBox");
  const btn = document.getElementById("loginBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    errorBox.classList.add("d-none");
    errorBox.textContent = "";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
      errorBox.textContent = "Inserisci email e password.";
      errorBox.classList.remove("d-none");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Accesso...";

    try {
      const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password }),
      });

      let data = null;
      try {
        data = await res.json();
      } catch {}

      if (!res.ok) {
        const message = data?.detail
          ? typeof data.detail === "string"
            ? data.detail
            : JSON.stringify(data.detail)
          : "Login fallito";
        throw new Error(message);
      }

      localStorage.setItem("access_token", data.access_token);
      window.location.href = "/";
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.remove("d-none");
    } finally {
      btn.disabled = false;
      btn.textContent = "Accedi";
    }
  });
</script>
{% endblock %}
