services:
  # =========================
  # YugabyteDB cluster
  # =========================
  yb1:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb1
    hostname: yb1
    command:
      [
        "bin/yugabyted",
        "start",
        "--base_dir=/home/yugabyte/yb_data",
        "--background=false",
        "--advertise_address=yb1",
        "--master_flags=replication_factor=3",
      ]
    environment:
      TZ: Europe/Rome
    ports:
      - "7000:7000"
      - "9000:9000"
      - "13000:13000"
      - "5433:5433"
      - "9042:9042"
      - "7200:7200"
    volumes:
      - yb1_data:/home/yugabyte/yb_data

  yb2:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb2
    hostname: yb2
    restart: unless-stopped
    depends_on:
      - yb1
    command:
      [
        "bash",
        "-lc",
        "until (exec 3<>/dev/tcp/yb1/7000) >/dev/null 2>&1; do echo 'Waiting yb1:7000...'; sleep 2; done; exec bin/yugabyted start --base_dir=/home/yugabyte/yb_data --background=false --advertise_address=yb2 --join=yb1",
      ]
    environment:
      TZ: Europe/Rome
    volumes:
      - yb2_data:/home/yugabyte/yb_data

  yb3:
    image: yugabytedb/yugabyte:2025.2.1.0-b141
    container_name: yb3
    hostname: yb3
    restart: unless-stopped
    depends_on:
      - yb1
    command:
      [
        "bash",
        "-lc",
        "until (exec 3<>/dev/tcp/yb1/7000) >/dev/null 2>&1; do echo 'Waiting yb1:7000...'; sleep 2; done; exec bin/yugabyted start --base_dir=/home/yugabyte/yb_data --background=false --advertise_address=yb3 --join=yb1",
      ]
    environment:
      TZ: Europe/Rome
    volumes:
      - yb3_data:/home/yugabyte/yb_data

  # =========================
  # Qdrant Vector Database
  # =========================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    environment:
      TZ: Europe/Rome
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./docker/qdrant/storage:/qdrant/storage

  # =========================
  # FastAPI
  # =========================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi_api
    restart: unless-stopped
    depends_on:
      - yb1
      - yb2
      - yb3
      - qdrant
    env_file:
      - .env
    environment:
      TZ: Europe/Rome
      DATABASE_URL: "postgresql+asyncpg://yugabyte:yugabyte@yb1:5433/yugabyte"
      RUN_SEED: "true"
      SEED_STRICT: "false"

      # Leggi tutto dal .env
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL}
      OLLAMA_GENERATE_PATH: ${OLLAMA_GENERATE_PATH}
      OLLAMA_EMBEDDINGS_PATH: ${OLLAMA_EMBEDDINGS_PATH}

      # Qdrant connection
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_GRPC_URL: "http://qdrant:6334"

    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  yb1_data:
  yb2_data:
  yb3_data:
# docker compose down -v
# docker compose up --build

# Metti nella console
# setx OLLAMA_NUM_GPU 0
# per non usare la gpu con ollama
